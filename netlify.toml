[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# ── API route rewrites ────────────────────────────────────────
[[redirects]]
  from  = "/api/admin/verify"
  to    = "/.netlify/functions/admin-verify"
  status = 200

[[redirects]]
  from  = "/api/admin/change-password"
  to    = "/.netlify/functions/admin-change-password"
  status = 200

[[redirects]]
  from  = "/api/resources/list"
  to    = "/.netlify/functions/resources-list"
  status = 200

[[redirects]]
  from  = "/api/resources/upload"
  to    = "/.netlify/functions/resources-upload"
  status = 200

[[redirects]]
  from  = "/api/resources/delete"
  to    = "/.netlify/functions/resources-delete"
  status = 200

[[redirects]]
  from  = "/api/courses/list"
  to    = "/.netlify/functions/courses-list"
  status = 200

[[redirects]]
  from  = "/api/courses/upload"
  to    = "/.netlify/functions/courses-upload"
  status = 200

[[redirects]]
  from  = "/api/courses/delete"
  to    = "/.netlify/functions/courses-delete"
  status = 200

# ── Security headers ──────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
