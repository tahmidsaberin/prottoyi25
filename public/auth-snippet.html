<!-- ================================================================
   HOW TO ADD AUTH TO YOUR EXISTING index.html
   Copy the two changes below into your existing index.html
================================================================ -->

<!-- CHANGE 1: In your <nav> element, add the auth-widget div
     Find your existing <nav id="navbar"> and add this div
     just before the closing </nav> tag:
-->
<div id="auth-widget" style="margin-left: auto; margin-right: 16px;"></div>


<!-- CHANGE 2: Add this <script> block at the very bottom of <body>,
     just before </body>:
-->
<script type="module">
  import { initNavbarAuth } from "./auth-ui.js";
  initNavbarAuth(document.getElementById("auth-widget"));
</script>
