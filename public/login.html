<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — Prottoyi 25</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=DM+Sans:wght@400;500&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --g1: #00FF40; --g4: #0BDA51;
      --bg: #060c07; --bg2: #0a130b; --bg3: #0f1c10;
      --border: rgba(11,218,81,0.15); --border2: rgba(11,218,81,0.32);
      --text: #e8f5e9; --text2: #9db89e; --text3: #5a7a5b;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      min-height: 100vh; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif; color: var(--text);
      background-image: radial-gradient(circle, rgba(11,218,81,0.07) 1px, transparent 1px);
      background-size: 32px 32px;
    }

    .login-card {
      width: 100%; max-width: 400px; margin: 16px;
      background: rgba(10,19,11,0.95);
      border: 0.5px solid var(--border2);
      border-radius: 16px; padding: 40px 36px;
      box-shadow: 0 0 60px rgba(11,218,81,0.10), 0 24px 64px rgba(0,0,0,0.5);
      text-align: center;
    }

    .login-logo-name {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px; font-weight: 700; letter-spacing: 3px;
      color: var(--g1); text-shadow: 0 0 24px rgba(0,255,64,0.5);
      margin-bottom: 4px;
    }
    .login-logo-sub {
      font-family: 'Space Mono', monospace;
      font-size: 11px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--text3); margin-bottom: 32px;
    }

    .login-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 20px; font-weight: 600; color: var(--text);
      margin-bottom: 8px;
    }
    .login-desc {
      font-size: 14px; color: var(--text2); margin-bottom: 28px;
      line-height: 1.6;
    }

    .login-divider {
      height: 0.5px; background: var(--border);
      margin: 24px 0;
    }

    /* The Google sign-in button is injected by auth-ui.js — but we also need
       a standalone button here for the initial load state */
    #google-btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 12px; width: 100%; padding: 12px 20px; border-radius: 10px;
      background: #fff; color: #3c4043;
      border: 1px solid #dadce0;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500;
      cursor: pointer;
      box-shadow: 0 1px 3px rgba(0,0,0,.15);
      transition: box-shadow .2s, background .15s;
    }
    #google-btn:hover:not(:disabled) {
      background: #f8f9fa; box-shadow: 0 2px 10px rgba(0,0,0,.2);
    }
    #google-btn:disabled { opacity: .6; cursor: not-allowed; }

    .btn-spinner {
      display: inline-block; width: 18px; height: 18px;
      border: 2px solid #dadce0; border-top-color: #4285F4;
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .login-error {
      margin-top: 14px; padding: 10px 14px;
      background: rgba(255,107,107,0.10); color: #ff6b6b;
      border: 0.5px solid rgba(255,107,107,.25);
      border-radius: 8px; font-size: 13px;
      display: none;
    }
    .login-error.visible { display: block; }

    .login-footer {
      margin-top: 28px;
      font-size: 12px; color: var(--text3); line-height: 1.7;
    }
    .login-footer a { color: var(--g4); text-decoration: none; }
    .login-footer a:hover { color: var(--g1); }

    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-family: 'Space Mono', monospace; font-size: 11px;
      letter-spacing: 1px; color: var(--text3);
      text-decoration: none; margin-top: 20px;
      transition: color .2s;
    }
    .back-link:hover { color: var(--g4); }
  </style>
</head>
<body>

<div class="login-card">
  <div class="login-logo-name">PROTTOYI 25</div>
  <div class="login-logo-sub">CSE · University of Chittagong</div>

  <div class="login-title">Welcome back</div>
  <p class="login-desc">
    Sign in with your Google account to access study resources, track your progress, and contribute to the community.
  </p>

  <button id="google-btn" onclick="handleGoogleSignIn()">
    <svg width="20" height="20" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
      <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
      <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
    </svg>
    Sign in with Google
  </button>

  <div class="login-error" id="login-error"></div>

  <div class="login-divider"></div>

  <p class="login-footer">
    By signing in you agree to use this platform responsibly.<br>
    This site is for students of <strong>CU CSE Batch 25</strong> only.
  </p>

  <a href="/index.html" class="back-link">
    <svg width="12" height="12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
    </svg>
    Back to home
  </a>
</div>

<script type="module">
  import { signInWithGoogle, onAuthChange } from "./auth.js";

  /* If already logged in, redirect to home immediately */
  onAuthChange((user) => {
    if (user) {
      const redirectTo = sessionStorage.getItem("p25_redirect_after_login") ?? "/index.html";
      sessionStorage.removeItem("p25_redirect_after_login");
      location.replace(redirectTo);
    }
  });

  /* Expose handler for the inline onclick (simpler for a standalone page) */
  window.handleGoogleSignIn = async function () {
    const btn = document.getElementById("google-btn");
    const err = document.getElementById("login-error");
    err.classList.remove("visible");

    btn.disabled = true;
    btn.innerHTML = `<span class="btn-spinner"></span> Signing in…`;

    try {
      await signInWithGoogle();
      /* onAuthChange above will fire and redirect */
    } catch (error) {
      btn.disabled = false;
      btn.innerHTML = `
        <svg width="20" height="20" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign in with Google`;
      err.textContent = error.message;
      err.classList.add("visible");
    }
  };
</script>
</body>
</html>
